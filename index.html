<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human and Machine</title>
    <link rel="stylesheet" href="css2.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .bg-slide.active {
            opacity: 0.6;
        }

        #content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            mix-blend-mode: overlay;
        }

        h1 {
            font-family: 'Bitter', serif;
            font-weight: 100;
            font-size: 4rem;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            opacity: 0.8;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }

        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            font-family: 'Roboto Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('liminal_bg_1.png')"></div>
        <div class="bg-slide" style="background-image: url('liminal_bg_2.png')"></div>
        <div class="bg-slide" style="background-image: url('liminal_bg_3.png')"></div>
        <div class="bg-slide" style="background-image: url('liminal_bg_4.png')"></div>
    </div>

    <div id="content">
        <h1>Human & Machine</h1>
        <p>Exploring the liminal spaces between consciousness and code.</p>
        
        <div class="controls">
            <button id="next-btn">Process Input</button>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.bg-slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Auto advance every 8 seconds
        let interval = setInterval(nextSlide, 8000);

        document.getElementById('next-btn').addEventListener('click', () => {
            clearInterval(interval);
            nextSlide();
            interval = setInterval(nextSlide, 8000);
            
            // Simple interactive feedback
            const btn = document.getElementById('next-btn');
            const originalText = btn.innerText;
            const prompts = ["Analyzing...", "Processing...", "Connecting...", "Dreaming..."];
            btn.innerText = prompts[Math.floor(Math.random() * prompts.length)];
            
            setTimeout(() => {
                btn.innerText = originalText;
            }, 1000);
        });
    </script>

</body>
</html>
